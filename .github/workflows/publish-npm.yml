name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node (for npm publish auth)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Regenerate spec artifacts
        run: bun run generate

      - name: Type check
        run: bun run type-check

      - name: Build
        run: bun run build

      - name: Publish to npm
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == *-* ]]; then
            TAG="${VERSION#*-}"     # 0.1.0-beta.0 → beta.0
            TAG="${TAG%%.*}"        # beta.0       → beta
            echo "Publishing prerelease $VERSION under npm dist-tag '$TAG'"
            npm publish --provenance --access public --tag "$TAG"
          else
            echo "Publishing stable $VERSION under npm dist-tag 'latest'"
            npm publish --provenance --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
